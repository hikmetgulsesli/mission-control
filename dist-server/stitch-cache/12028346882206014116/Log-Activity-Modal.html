<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log Activity Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1258e2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-slate-900/50 dark:bg-slate-900/80 font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-2xl flex flex-col overflow-hidden">
<!-- Header -->
<div class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold">Log Activity</h2>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Body -->
<div class="p-6 overflow-y-auto max-h-[calc(100vh-160px)] flex flex-col gap-6">
<!-- Activity Type -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="activity-type">Activity Type</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="activity-type">
<option disabled="" selected="" value="">Select activity type</option>
<option value="phone">Phone Call</option>
<option value="email">Email Sent</option>
<option value="in-person">In-Person Meeting</option>
<option value="video">Video Call</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Date, Time & Duration Row -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="flex flex-col gap-2 md:col-span-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="date-time">Date &amp; Time</label>
<div class="flex gap-2">
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="date" type="date"/>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="time" type="time"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="duration">Duration (min)</label>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="duration" placeholder="e.g. 30" type="number"/>
</div>
</div>
<!-- Meeting Notes -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="notes">Meeting Notes</label>
<textarea class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow resize-y min-h-[120px]" id="notes" placeholder="Enter detailed notes about the interaction..." rows="4"></textarea>
</div>
<!-- Result & Next Action Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="result">Result</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="result">
<option disabled="" selected="" value="">Select outcome</option>
<option class="text-green-600 dark:text-green-400" value="positive">Positive</option>
<option class="text-slate-600 dark:text-slate-400" value="neutral">Neutral</option>
<option class="text-red-600 dark:text-red-400" value="negative">Negative</option>
<option class="text-primary" value="quote">Quote Requested</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="next-action">Next Action Date</label>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="next-action" type="date"/>
</div>
</div>
</div>
<!-- Footer / Actions -->
<div class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
<button class="px-5 py-2.5 rounded-lg text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-400">
                Cancel
            </button>
<button class="px-5 py-2.5 rounded-lg bg-primary text-white font-medium hover:bg-blue-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900">
                Save Activity
            </button>
</div>
</div>
</body></html>
