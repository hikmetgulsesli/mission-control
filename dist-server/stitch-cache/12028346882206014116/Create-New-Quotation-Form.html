<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Select Customer <span class="text-red-500">*</span></label>

<select class="form-select block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm pl-4 pr-10 py-3 appearance-none">

<option value="globex">Globex Corporation</option>
<option value="soylent">Soylent Corp</option>

</div>

</div>

<div class="relative">
<input class="form-input block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm pl-4 pr-4 py-3" type="date"/>
</div>
</div>
</div>
</section>

                                Shipping Route
                            </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Origin Country</label>
<select class="form-select block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm px-4 py-3">

<option value="us">United States</option>
<option value="cn">China</option>
<option value="de">Germany</option>
</select>
</div>
<div class="flex flex-col gap-1.5">

<option value="us">United States</option>
<option value="cn">China</option>
<option value="de">Germany</option>
</select>
</div>
<div class="flex flex-col gap-1.5">

</div>

<div class="flex gap-4">
<label class="cursor-pointer relative flex-1">
<input checked="" class="peer sr-only" name="transport_mode" type="radio" value="sea"/>
<div class="rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400 peer-checked:text-primary">directions_boat</span>
<span class="font-medium text-slate-700 dark:text-slate-300 peer-checked:text-primary">Sea</span>
</div>
</label>
<label class="cursor-pointer relative flex-1">
<input class="peer sr-only" name="transport_mode" type="radio" value="air"/>
<div class="rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400 peer-checked:text-primary">flight</span>
<span class="font-medium text-slate-700 dark:text-slate-300 peer-checked:text-primary">Air</span>
</div>
</label>
<label class="cursor-pointer relative flex-1">
<input class="peer sr-only" name="transport_mode" type="radio" value="land"/>
<div class="rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400 peer-checked:text-primary">local_shipping</span>
<span class="font-medium text-slate-700 dark:text-slate-300 peer-checked:text-primary">Land</span>
</div>
</label>

<option value="fob">FOB (Free on Board)</option>
<option value="cif">CIF (Cost, Insurance and Freight)</option>
<option value="dap">DAP (Delivered at Place)</option>
</select>

<select class="form-select block w-24 rounded-none rounded-r-lg border-l-0 border-slate-300 dark:border-slate-700 bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm px-3 py-3">

<option value="eur">EUR</option>
<option value="try">TRY</option>
</select>

</div>
</div>
</section>
<hr class="border-slate-200 dark:border-slate-800"/>

<h2 class="text-xl font-bold leading-tight tracking-tight text-slate-900 dark:text-slate-100 mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">assignment_ind</span>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Assigned Representative</label>
<select class="form-select block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm px-4 py-3">

<option value="rep1">John Smith</option>
<option value="rep2">Alice Johnson</option>

</div>

<select class="form-select block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm px-4 py-3">
<option selected="" value="pending">Pending</option>
<option value="won">Won</option>
<option value="lost">Lost</option>
</select>
</div>
</div>
</section>
</div>
</div>
</div>
</div>
</div>
