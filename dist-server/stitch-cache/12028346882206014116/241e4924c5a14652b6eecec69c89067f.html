<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shipping CRM Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1258e2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center bg-cover bg-center bg-no-repeat" data-alt="Logistics background cargo ship containers map faint" style="background-image: linear-gradient(to right bottom, rgba(246, 246, 248, 0.9), rgba(246, 246, 248, 0.9)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuAyb_Rhvmny0b6kVZzTeo2gWaShGWULcKe1sxBevg5sNdRYOHhGbEL5y2glIhlqjWxF6XAJTwKuZgOp74juYEHZLi5axORZoSrsnkFzf0a7FyEpmujr0CJt2twzOyKJgYm2wOn2Ot_jxE0Lpmoq-Ke4J7LbAqD4IKqPv4KiJAMDCYGD9wQWrk-pXBthDw6pqwOLh5c6WB06yacbiDgGxYiGMbJfePCNvd8uv-x_tiYMDyx98R8-meAdRJAruOTFkB_Bx0yzNLy_9syN');">
<div class="w-full max-w-[480px] p-6">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-700 p-8 flex flex-col">
<!-- Branding -->
<div class="flex items-center justify-center gap-3 mb-8">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-4xl">local_shipping</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">GlobalShip CRM</h1>
</div>
<div class="mb-6 text-center">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Welcome Back</h2>
<p class="text-sm text-slate-500 dark:text-slate-400">Log in to your International Shipping CRM account</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="form-input w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-colors" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="form-input w-full pl-10 pr-10 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-colors" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary bg-white dark:bg-slate-700 dark:border-slate-600" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors mt-2" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer -->
<div class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
<p>Don't have an account? <a class="font-medium text-primary hover:text-primary/80" href="#">Contact Admin</a></p>
</div>
</div>
<div class="mt-6 text-center text-xs text-slate-500 dark:text-slate-500">
            © 2024 GlobalShip Logistics CRM. All rights reserved.
        </div>
</div>
</body></html>
