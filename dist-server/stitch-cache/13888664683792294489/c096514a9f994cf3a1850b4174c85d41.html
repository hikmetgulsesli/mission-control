<!DOCTYPE html>

<html lang="tr"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231d",

                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        }

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">

<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-100 dark:border-slate-800 px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">
                                auto_stories
                            </span>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] text-slate-800 dark:text-slate-100">Not Defteri</h2>
</div>
<button class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-5 bg-primary hover:bg-primary/90 transition-colors text-white text-sm font-semibold leading-normal tracking-[0.015em]">

</button>
</header>
<div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
<label class="flex flex-col h-11 w-full max-w-2xl mx-auto">
<div class="flex w-full flex-1 items-stretch rounded-lg h-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all shadow-sm">
<div class="text-slate-400 flex items-center justify-center pl-4 rounded-l-lg">
<span class="material-symbols-outlined text-[20px]">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 text-sm font-normal leading-normal text-slate-700 dark:text-slate-200" placeholder="Notlarda ara..." value=""/>
</div>
</label>
</div>
<div class="flex flex-1 flex-col items-center justify-center p-8 bg-slate-50/30 dark:bg-transparent">
<div class="flex flex-col items-center max-w-[480px] text-center">
<div class="mb-6 h-32 w-32 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-slate-300 dark:text-slate-600">
                                    note_stack
                                </span>
</div>

<button class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-6 bg-primary/10 hover:bg-primary/20 text-primary dark:text-primary dark:bg-primary/20 dark:hover:bg-primary/30 transition-colors text-sm font-semibold leading-normal">
<span class="material-symbols-outlined mr-2 text-lg">add_circle</span>

</button>
</div>
</div>
</div>
</div>
</div>
