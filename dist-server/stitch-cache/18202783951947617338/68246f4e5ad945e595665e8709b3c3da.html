<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e21d48",
                        "background-light": "#fefce8", // Soft yellow-50 style as requested
                        "background-dark": "#211115",
                        "rose-accent": "#fb7185",
                        "violet-accent": "#a78bfa"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .drawing-canvas-bg {
            background-image: radial-gradient(#e21d4822 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden drawing-canvas-bg">
<div class="layout-container flex h-full grow flex-col">
<!-- Header Component -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center gap-3">
<div class="size-10 flex items-center justify-center rounded-xl bg-primary text-white">
<span class="material-symbols-outlined text-2xl">draw</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Hata Durumu</h2>
</div>
<div class="flex gap-2">
<button class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<!-- Main Content: Error State -->
<main class="flex flex-1 flex-col items-center justify-center px-6 text-center">
<div class="max-w-md w-full p-8 rounded-xl bg-white dark:bg-slate-900 shadow-xl border border-primary/5 flex flex-col items-center gap-8">
<!-- Playful Illustration -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Abstract Creative Error Illustration -->
<div class="absolute inset-0 bg-gradient-to-tr from-rose-accent/20 to-violet-accent/20 rounded-full blur-3xl"></div>
<div class="relative z-10 flex flex-col items-center">
<!-- Spilled Paint Bucket / Broken Tool Concept -->
<div class="w-32 h-32 bg-primary rounded-2xl rotate-12 flex items-center justify-center relative shadow-lg">
<span class="material-symbols-outlined text-white text-6xl">format_paint</span>
<div class="absolute -bottom-4 -left-8 w-24 h-12 bg-primary/40 rounded-full blur-md"></div>
<div class="absolute -bottom-6 -right-4 w-16 h-8 bg-violet-accent/40 rounded-full blur-md"></div>
</div>
<div class="mt-4 flex gap-2">
<div class="w-3 h-3 rounded-full bg-rose-accent animate-bounce"></div>
<div class="w-3 h-3 rounded-full bg-violet-accent animate-bounce" style="animation-delay: 0.2s"></div>
<div class="w-3 h-3 rounded-full bg-primary animate-bounce" style="animation-delay: 0.4s"></div>
</div>
</div>
<!-- Broken Pencil Decoration -->
<div class="absolute top-0 right-0 -rotate-45 opacity-20">
<span class="material-symbols-outlined text-8xl text-primary">edit_off</span>
</div>
</div>
<!-- Error Messages -->
<div class="space-y-3">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">
                            Bir Hata Oluştu
                        </h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                            Canvas yüklenirken bir sorun oluştu. <br/>Lütfen sayfayı yenileyin.
                        </p>
</div>
<!-- Action Button -->
<div class="w-full pt-4">
<button class="w-full flex items-center justify-center gap-3 px-8 py-4 bg-primary hover:bg-primary/90 text-white rounded-full font-bold text-lg transition-all shadow-lg shadow-primary/25">
<span class="material-symbols-outlined">refresh</span>
<span>Yenile</span>
</button>
</div>
<!-- Footer Info -->
<div class="pt-4 flex flex-col items-center gap-1">
<span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Hata Kodu</span>
<code class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded text-primary font-mono text-sm">ERR_CANVAS_LOAD_05</code>
</div>
</div>
<!-- Playful floating elements -->
<div class="absolute bottom-10 left-10 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-7xl text-violet-accent">palette</span>
</div>
<div class="absolute top-40 right-10 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-7xl text-rose-accent">brush</span>
</div>
</main>
<!-- Decorative Bottom Bar -->
<footer class="p-6 flex justify-center items-center">
<div class="flex gap-4 p-2 bg-white/50 dark:bg-slate-800/50 rounded-full backdrop-blur-sm border border-slate-200 dark:border-slate-700">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-sm">info</span>
</div>
<p class="text-sm text-slate-600 dark:text-slate-400 py-1 px-2">Sanat bekleyebilir, teknik ekip kontrol ediyor.</p>
</div>
</footer>
</div>
</div>
</body></html>
