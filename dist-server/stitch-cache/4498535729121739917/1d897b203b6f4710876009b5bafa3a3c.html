<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yapılacaklar Listesi</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        // Neutral palette derived subtly from primary hue (slate/blueish)
                        "surface-dark": "#1e2433",
                        "surface-border": "#2e364a"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "2rem", 
                        "xl": "3rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom checkbox style if forms plugin is not sufficient */
        .custom-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25em;
            height: 1.25em;
            border: 2px solid theme('colors.slate.600');
            border-radius: 0.25em;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: theme('colors.primary');
            border-color: theme('colors.primary');
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen w-full flex items-center justify-center p-4 text-slate-900 dark:text-slate-100">
<!-- Main Card Container -->
<div class="w-full max-w-[500px] bg-white dark:bg-surface-dark rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.4)] border border-slate-200 dark:border-surface-border overflow-hidden flex flex-col">
<div class="p-6 sm:p-8 flex-1">
<!-- Header -->
<div class="mb-8">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Yapılacaklar Listesi</h1>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Bugün odaklanman gerekenler.</p>
</div>
<!-- Input Section -->
<div class="flex flex-col sm:flex-row gap-3 mb-8">
<div class="relative flex-1">
<input class="w-full bg-slate-50 dark:bg-[#151a26] border border-slate-200 dark:border-surface-border text-slate-900 dark:text-white rounded-lg pl-4 pr-10 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 text-sm sm:text-base" placeholder="Yeni görev ekle..." type="text"/>
</div>
<button class="bg-primary hover:bg-primary/90 text-white rounded-lg px-6 py-3.5 flex items-center justify-center gap-2 font-medium transition-colors shadow-sm shrink-0">
<span class="material-symbols-outlined text-[20px]">add</span>
<span class="sm:hidden">Ekle</span>
</button>
</div>
<!-- Filter Tabs -->
<div class="flex flex-wrap gap-2 mb-6">
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-primary text-white shadow-sm transition-colors">
                    Tümü
                </button>
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-surface-border/50 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-surface-border transition-colors">
                    Aktif
                </button>
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-surface-border/50 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-surface-border transition-colors">
                    Tamamlanan
                </button>
</div>
<!-- Task List -->
<div class="space-y-1 sm:space-y-2">
<!-- Task Item: Active -->
<div class="group flex items-center gap-4 p-3 -mx-3 rounded-lg hover:bg-slate-50 dark:hover:bg-surface-border/40 transition-colors cursor-pointer">
<div class="shrink-0 flex items-center pt-0.5">
<input class="custom-checkbox" type="checkbox"/>
</div>
<span class="flex-1 text-slate-700 dark:text-slate-200 text-[15px] leading-snug">Tasarım toplantısı yap</span>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all focus:opacity-100 p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10 shrink-0">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Task Item: Completed -->
<div class="group flex items-center gap-4 p-3 -mx-3 rounded-lg hover:bg-slate-50 dark:hover:bg-surface-border/40 transition-colors cursor-pointer">
<div class="shrink-0 flex items-center pt-0.5">
<input checked="" class="custom-checkbox" type="checkbox"/>
</div>
<span class="flex-1 text-slate-400 dark:text-slate-500 text-[15px] leading-snug line-through">Proje gereksinimlerini belirle</span>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all focus:opacity-100 p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10 shrink-0">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Task Item: Active -->
<div class="group flex items-center gap-4 p-3 -mx-3 rounded-lg hover:bg-slate-50 dark:hover:bg-surface-border/40 transition-colors cursor-pointer">
<div class="shrink-0 flex items-center pt-0.5">
<input class="custom-checkbox" type="checkbox"/>
</div>
<span class="flex-1 text-slate-700 dark:text-slate-200 text-[15px] leading-snug">Müşteri geri bildirimlerini incele ve raporla</span>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all focus:opacity-100 p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10 shrink-0">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Task Item: Completed -->
<div class="group flex items-center gap-4 p-3 -mx-3 rounded-lg hover:bg-slate-50 dark:hover:bg-surface-border/40 transition-colors cursor-pointer">
<div class="shrink-0 flex items-center pt-0.5">
<input checked="" class="custom-checkbox" type="checkbox"/>
</div>
<span class="flex-1 text-slate-400 dark:text-slate-500 text-[15px] leading-snug line-through">Günlük stand-up</span>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all focus:opacity-100 p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10 shrink-0">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
<!-- Footer / Status -->
<div class="bg-slate-50 dark:bg-[#151a26] px-6 sm:px-8 py-4 border-t border-slate-200 dark:border-surface-border flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400 font-medium">2 aktif görev</span>
<button class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                Tamamlananları temizle
            </button>
</div>
</div>
</body></html>
