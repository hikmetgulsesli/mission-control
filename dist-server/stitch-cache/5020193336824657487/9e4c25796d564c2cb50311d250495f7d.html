<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Professional Dark Calculator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e9445f",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a1a2e",
                        "calc-base": "#16213e",
                        "calc-display": "#0f3460",
                        "op-purple": "#533483",
                        "eq-cyan": "#00d9ff",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "20px",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Main Calculator Container -->
<div class="w-full max-w-[400px] bg-calc-base rounded-lg p-6 shadow-2xl border border-white/5">
<!-- Header -->
<header class="flex items-center justify-between mb-6 px-2">
<div class="flex items-center gap-2 text-slate-100">
<span class="material-symbols-outlined text-primary">calculate</span>
<h2 class="text-sm font-bold tracking-wide uppercase opacity-80">Pro Calc</h2>
</div>
<button class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-slate-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
</header>
<!-- Display Area -->
<div class="bg-calc-display rounded-lg p-6 mb-6 shadow-inner border border-black/20 flex flex-col items-end justify-end min-h-[120px]">
<span class="text-slate-400 text-sm font-mono mb-1">1,250 × 4</span>
<h1 class="text-slate-100 text-5xl font-mono font-bold tracking-tighter overflow-hidden whitespace-nowrap">
                5,000.00
            </h1>
</div>
<!-- Buttons Grid -->
<div class="grid grid-cols-4 gap-3">
<!-- Row 1: Function Keys -->
<button class="h-16 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined">restart_alt</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined">backspace</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-op-purple hover:brightness-110 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined">percent</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-op-purple hover:brightness-110 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Row 2: Numbers + Operator -->
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">7</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">8</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">9</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-op-purple hover:brightness-110 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined">remove</span>
</button>
<!-- Row 3: Numbers + Operator -->
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">4</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">5</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">6</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-op-purple hover:brightness-110 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined">add</span>
</button>
<!-- Row 4: Numbers + Equals (Grid layout starts spanning) -->
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">1</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">2</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">3</button>
<!-- Equals Spanning Row 4 and 5 -->
<button class="row-span-2 flex items-center justify-center rounded-lg bg-eq-cyan hover:brightness-110 text-slate-900 font-bold text-2xl transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined text-3xl">drag_handle</span>
</button>
<!-- Row 5: Bottom Keys -->
<button class="h-16 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-slate-100 font-bold text-xl transition-all shadow-lg active:scale-95">
                ±
            </button>
<button class="h-16 flex items-center justify-center rounded-lg bg-primary hover:brightness-110 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">0</button>
<button class="h-16 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-slate-100 font-bold text-2xl transition-all shadow-lg active:scale-95">.</button>
</div>
<!-- Footer Stats -->
<div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center text-[10px] text-slate-500 font-bold uppercase tracking-[2px]">
<span>Memory: 0.00</span>
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<span>Connected</span>
</div>
</div>
</div>
</body></html>
