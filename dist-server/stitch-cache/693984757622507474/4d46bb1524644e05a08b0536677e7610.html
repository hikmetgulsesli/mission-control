<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nakliye CRM Yeni Aktivite Formu</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2491eb",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111a21",
                        "slate-900": "#0f172a",
                        "slate-800": "#1e293b",
                        "slate-700": "#334155",
                        "slate-600": "#475569",
                        "slate-500": "#64748b",
                        "slate-400": "#94a3b8",
                        "slate-300": "#cbd5e1",
                        "slate-200": "#e2e8f0",
                        "slate-100": "#f1f5f9",
                        "slate-50": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Work Sans', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-40 flex flex-1 justify-center py-10">
<div class="layout-content-container flex flex-col max-w-[800px] flex-1 w-full bg-white dark:bg-slate-800 shadow-sm rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700">
<div class="flex flex-wrap items-center justify-between gap-3 p-6 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50">
<p class="font-display text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight min-w-72">Yeni Aktivite Ekle</p>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 flex flex-col gap-6">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Müşteri Seçimi</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 h-11 pl-10 pr-10 text-sm font-normal leading-normal appearance-none transition-shadow">
<option disabled="" selected="" value="">Müşteri arayın veya seçin...</option>
<option value="logistics-a">ABC Lojistik A.Ş.</option>
<option value="transport-b">XYZ Taşımacılık</option>
<option value="global-c">Global Kargo Çözümleri</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
<div class="flex flex-col gap-2">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal">Aktivite Türü</p>
<div class="flex flex-wrap gap-2 rounded-lg bg-slate-100 dark:bg-slate-900 p-1 border border-slate-200 dark:border-slate-700">
<label class="flex cursor-pointer h-10 grow items-center justify-center overflow-hidden rounded-md px-4 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="material-symbols-outlined mr-2 text-[20px]">call</span>
<span class="truncate">Arama</span>
<input checked="" class="invisible w-0 absolute" name="activity-type" type="radio" value="Arama"/>
</label>
<label class="flex cursor-pointer h-10 grow items-center justify-center overflow-hidden rounded-md px-4 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="material-symbols-outlined mr-2 text-[20px]">domain</span>
<span class="truncate">Ziyaret</span>
<input class="invisible w-0 absolute" name="activity-type" type="radio" value="Ziyaret"/>
</label>
<label class="flex cursor-pointer h-10 grow items-center justify-center overflow-hidden rounded-md px-4 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="material-symbols-outlined mr-2 text-[20px]">mail</span>
<span class="truncate">E-posta</span>
<input class="invisible w-0 absolute" name="activity-type" type="radio" value="E-posta"/>
</label>
<label class="flex cursor-pointer h-10 grow items-center justify-center overflow-hidden rounded-md px-4 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="material-symbols-outlined mr-2 text-[20px]">calendar_today</span>
<span class="truncate">Toplantı</span>
<input class="invisible w-0 absolute" name="activity-type" type="radio" value="Toplantı"/>
</label>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Tarih</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">calendar_month</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 h-11 pl-10 pr-3 text-sm font-normal leading-normal transition-shadow" type="date" value="2023-10-25"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Saat</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">schedule</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 h-11 pl-10 pr-3 text-sm font-normal leading-normal transition-shadow" type="time" value="14:30"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Süre (dakika)</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">timer</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 h-11 pl-10 pr-3 text-sm font-normal leading-normal transition-shadow" min="5" placeholder="Örn: 30" step="5" type="number" value="30"/>
</div>
</label>
</div>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Konu</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 h-11 px-3 text-sm font-normal leading-normal transition-shadow" placeholder="Aktivitenin ana konusu nedir?" type="text" value="Yeni Lojistik Anlaşması Görüşmesi"/>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Açıklama</p>
<textarea class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-3 text-sm font-normal leading-normal transition-shadow min-h-[120px] resize-y" placeholder="Görüşme detaylarını, alınan notları buraya girin..."></textarea>
</label>
<div class="border-t border-slate-200 dark:border-slate-700 pt-6">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2">Sonraki Aksiyon <span class="text-slate-400 font-normal">(İsteğe Bağlı)</span></p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 h-11 px-3 text-sm font-normal leading-normal transition-shadow" placeholder="Bu aktiviteden sonra ne yapılacak?" type="text"/>
</label>
<div class="mt-4">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-5 h-5 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-900 checked:bg-primary checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 dark:focus:ring-offset-slate-800 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[16px] pointer-events-none opacity-0 peer-checked:opacity-100">check</span>
</div>
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium group-hover:text-slate-900 dark:group-hover:text-slate-100 transition-colors">Hatırlatıcı Oluştur</span>
</label>
</div>
</div>
</div>
<div class="flex items-center justify-end gap-3 p-6 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 rounded-b-xl">
<button class="flex min-w-[100px] items-center justify-center rounded-lg px-5 h-10 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold tracking-wide hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 dark:focus:ring-offset-slate-900">
                            İptal
                        </button>
<button class="flex min-w-[100px] items-center justify-center rounded-lg px-5 h-10 bg-primary text-white text-sm font-semibold tracking-wide hover:bg-primary/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900 shadow-sm">
<span class="material-symbols-outlined mr-2 text-[18px]">save</span>
                            Kaydet
                        </button>
</div>
</div>
</div>
</div>
</div>
</body></html>
