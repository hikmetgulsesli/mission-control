<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minimalist Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2162ed",
                        "background-light": "#f5f5f5",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-4 bg-white dark:bg-slate-900 shadow-sm">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-6 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">calculate</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">Minimalist Counter</h2>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-8">
<div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-xl shadow-lg p-12 flex flex-col items-center gap-12 border border-slate-100 dark:border-slate-800">
<h1 class="text-[6rem] font-bold leading-none tracking-tight text-slate-800 dark:text-slate-100">0</h1>
<div class="flex items-center justify-center gap-6 w-full">
<button aria-label="Decrease" class="flex items-center justify-center size-16 rounded-full bg-red-100 hover:bg-red-200 dark:bg-red-900/30 dark:hover:bg-red-900/50 text-red-600 dark:text-red-400 transition-colors focus:outline-none focus:ring-4 focus:ring-red-500/20">
<span class="material-symbols-outlined text-3xl">remove</span>
</button>
<button aria-label="Reset" class="flex items-center justify-center size-16 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 transition-colors focus:outline-none focus:ring-4 focus:ring-slate-500/20">
<span class="material-symbols-outlined text-2xl">refresh</span>
</button>
<button aria-label="Increase" class="flex items-center justify-center size-16 rounded-full bg-green-100 hover:bg-green-200 dark:bg-green-900/30 dark:hover:bg-green-900/50 text-green-600 dark:text-green-400 transition-colors focus:outline-none focus:ring-4 focus:ring-green-500/20">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
</main>
</body></html>
