<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Activity Form: Logistics CRM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0da6f2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-body text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-10 py-3">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-2xl">local_shipping</span>
</div>
<h2 class="font-display text-lg font-bold leading-tight tracking-[-0.015em]">Logistics CRM</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<nav class="flex items-center gap-9">
<a class="text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Dashboard</a>
<a class="text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Shipments</a>
<a class="text-sm font-medium leading-normal hover:text-primary transition-colors" href="#">Customers</a>
<a class="text-sm font-medium leading-normal text-primary" href="#">Activities</a>
</nav>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10" data-alt="User profile picture of a man" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA-HzM3dY3BIF5SMoIFPh-XnCQ2N7Q45uPu3nNtvnkBLyPBrkjuAfu2HagEVYRoboAiaN9RoqIL81jiv91z-0PSCikGaJS_5HuWZOaXvYezCxK1mU1s7Yd-64MMWs0CUoI4T5_iwfL3CZejiDBbwnHnwpbiGxsxymi5ZDb7pvsVE5z0fzUfLhIDMJY6i-s6jeSWMAVuoMX7P3Z-pYmlU9vUg0cwqiXRa-2PlnMqh_XS7ceYzZu3jWciopTIOib60SM02yYYJRF67jo");'></div>
</div>
</header>
<main class="flex-1 flex justify-center py-8 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-3xl bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-6 sm:p-8">
<div class="mb-8">
<h1 class="font-display text-3xl font-bold tracking-tight mb-2">Create Activity</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Add a new activity to your CRM to keep track of interactions.</p>
</div>
<form class="space-y-8">
<div>
<h3 class="font-display text-lg font-semibold mb-4">Aktivite Türü (Activity Type)</h3>
<div class="flex flex-wrap gap-3">
<button class="flex items-center gap-2 rounded-lg px-4 py-2 bg-primary text-white font-medium transition-colors ring-2 ring-primary ring-offset-2 dark:ring-offset-slate-900" type="button">
<span class="material-symbols-outlined text-sm">call</span>
<span>Arama</span>
</button>
<button class="flex items-center gap-2 rounded-lg px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" type="button">
<span class="material-symbols-outlined text-sm">groups</span>
<span>Toplantı</span>
</button>
<button class="flex items-center gap-2 rounded-lg px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" type="button">
<span class="material-symbols-outlined text-sm">mail</span>
<span>Email</span>
</button>
<button class="flex items-center gap-2 rounded-lg px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" type="button">
<span class="material-symbols-outlined text-sm">edit_note</span>
<span>Not</span>
</button>
</div>
</div>
<div>
<h3 class="font-display text-lg font-semibold mb-4">Müşteri &amp; Detaylar (Customer &amp; Details)</h3>
<div class="grid grid-cols-1 gap-6">
<div>
<label class="block text-sm font-medium mb-1" for="customer">Müşteri Seçimi (Customer Selection)</label>
<select class="block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm focus:border-primary focus:ring-primary sm:text-sm" id="customer" name="customer">
<option disabled="" selected="" value="">Select a customer...</option>
<option value="1">Acme Logistics Corp.</option>
<option value="2">Global Freight Solutions</option>
<option value="3">Oceanic Shipping Lines</option>
</select>
</div>
<div>
<label class="block text-sm font-medium mb-1" for="title">Başlık (Title)</label>
<input class="block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm focus:border-primary focus:ring-primary sm:text-sm" id="title" name="title" placeholder="E.g., Follow up on Q3 contract" type="text"/>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium mb-1" for="datetime">Tarih ve Saat Seçici (Date &amp; Time)</label>
<input class="block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm focus:border-primary focus:ring-primary sm:text-sm" id="datetime" name="datetime" type="datetime-local"/>
</div>
<div>
<label class="block text-sm font-medium mb-1" for="duration">Süre (Dakika) (Duration)</label>
<input class="block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm focus:border-primary focus:ring-primary sm:text-sm" id="duration" min="5" name="duration" placeholder="30" step="5" type="number"/>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-1" for="notes">Notlar (Notes)</label>
<textarea class="block w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm focus:border-primary focus:ring-primary sm:text-sm" id="notes" name="notes" placeholder="Enter detailed notes about the activity..." rows="4"></textarea>
</div>
<div class="flex items-center gap-3">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary" id="reminder" name="reminder" type="checkbox"/>
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="reminder">Hatırlatıcı Ekle (Add Reminder)</label>
</div>
</div>
</div>
<div class="pt-6 border-t border-slate-200 dark:border-slate-800 flex items-center justify-end gap-4">
<button class="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button">
                                İptal (Cancel)
                            </button>
<button class="px-5 py-2.5 rounded-lg text-sm font-medium bg-primary text-white hover:bg-primary/90 transition-colors shadow-sm" type="submit">
                                Kaydet (Save)
                            </button>
</div>
</form>
</div>
</div>
</main>
</div>
</body></html>
