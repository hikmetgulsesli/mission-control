<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yapılacaklar Listesi Light Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "surface-light": "#ffffff",
                        "text-main": "#1e293b",
                        "text-muted": "#64748b",
                        "border-color": "#e2e8f0"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light text-text-main font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[500px] bg-surface-light rounded-xl shadow-sm border border-border-color overflow-hidden flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-5 border-b border-border-color">
<div class="flex items-center gap-3 text-text-main">
<span class="material-symbols-outlined text-primary text-2xl">checklist</span>
<h1 class="text-xl font-bold tracking-tight">Yapılacaklar Listesi</h1>
</div>
</header>
<!-- Input Section -->
<div class="p-6 pb-2">
<div class="flex gap-3">
<div class="relative flex-1">
<input class="w-full h-12 pl-4 pr-4 rounded-lg border border-border-color bg-background-light focus:bg-surface-light focus:ring-2 focus:ring-primary/20 focus:border-primary text-text-main placeholder:text-text-muted transition-colors outline-none" placeholder="Yeni görev ekle..." type="text"/>
</div>
<button class="h-12 px-6 bg-primary hover:bg-primary/90 text-white rounded-lg font-medium flex items-center gap-2 transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-primary">
<span class="material-symbols-outlined text-[20px]">add</span>
                    Ekle
                </button>
</div>
</div>
<!-- Filter Tabs -->
<div class="px-6 py-4">
<div class="flex p-1 bg-background-light rounded-lg gap-1 w-full max-w-[300px]">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="filter" type="radio" value="all"/>
<div class="text-center py-2 px-3 text-sm font-medium rounded-md text-text-muted hover:text-text-main transition-colors peer-checked:bg-surface-light peer-checked:text-primary peer-checked:shadow-sm">
                        Tümü
                    </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="filter" type="radio" value="active"/>
<div class="text-center py-2 px-3 text-sm font-medium rounded-md text-text-muted hover:text-text-main transition-colors peer-checked:bg-surface-light peer-checked:text-primary peer-checked:shadow-sm">
                        Aktif
                    </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="filter" type="radio" value="completed"/>
<div class="text-center py-2 px-3 text-sm font-medium rounded-md text-text-muted hover:text-text-main transition-colors peer-checked:bg-surface-light peer-checked:text-primary peer-checked:shadow-sm">
                        Tamamlanan
                    </div>
</label>
</div>
</div>
<!-- Task List -->
<div class="px-2 pb-4 flex-1 overflow-y-auto max-h-[400px]">
<!-- Active Task 1 -->
<div class="group flex items-center gap-3 p-4 hover:bg-background-light rounded-lg transition-colors border border-transparent hover:border-border-color/50 mx-2 mb-1">
<label class="relative flex items-center cursor-pointer">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded border-2 border-border-color peer-checked:bg-primary peer-checked:border-primary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</label>
<span class="flex-1 text-text-main">Haftalık raporu hazırla</span>
<button class="text-text-muted hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded-md hover:bg-red-50">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Active Task 2 -->
<div class="group flex items-center gap-3 p-4 hover:bg-background-light rounded-lg transition-colors border border-transparent hover:border-border-color/50 mx-2 mb-1">
<label class="relative flex items-center cursor-pointer">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded border-2 border-border-color peer-checked:bg-primary peer-checked:border-primary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</label>
<span class="flex-1 text-text-main">Müşteri toplantısı için notları düzenle</span>
<button class="text-text-muted hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded-md hover:bg-red-50">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Completed Task -->
<div class="group flex items-center gap-3 p-4 hover:bg-background-light rounded-lg transition-colors border border-transparent hover:border-border-color/50 mx-2 mb-1">
<label class="relative flex items-center cursor-pointer">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded border-2 border-primary bg-primary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-[14px]">check</span>
</div>
</label>
<span class="flex-1 text-text-muted line-through">Proje teklifini gönder</span>
<button class="text-text-muted hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded-md hover:bg-red-50">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Empty State (Hidden in this view, but included for completeness) -->
<!--
            <div class="flex flex-col items-center justify-center py-12 px-4 text-center">
                <div class="w-16 h-16 bg-background-light rounded-full flex items-center justify-center mb-4 text-text-muted">
                    <span class="material-symbols-outlined text-3xl">task</span>
                </div>
                <h3 class="text-text-main font-medium mb-1">Henüz görev yok</h3>
                <p class="text-sm text-text-muted">Yukarıdan yeni bir görev ekleyerek başlayın!</p>
            </div>
            -->
</div>
<!-- Footer / Stats -->
<div class="px-6 py-4 border-t border-border-color bg-background-light/50 text-xs text-text-muted flex justify-between items-center rounded-b-xl">
<span>2 görev kaldı</span>
<button class="hover:text-text-main transition-colors">Tamamlananları temizle</button>
</div>
</div>
</body></html>
