<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Logistics CRM</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex items-center gap-9">
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors" href="#">Dashboard</a>
<a class="text-primary text-sm font-medium leading-normal" href="#">Reminders</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors" href="#">Customers</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium leading-normal transition-colors" href="#">Settings</a>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">
                            JD
                        </div>
</div>
</div>
</header>
<div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-8">
<div class="layout-content-container flex flex-col w-full max-w-[800px] flex-1 bg-white dark:bg-[#15232b] rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 md:p-8">
<div class="flex flex-col gap-2 mb-8 border-b border-slate-200 dark:border-slate-800 pb-6">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">Yeni Hatırlatıcı Oluştur</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Sistem içi bildirim veya e-posta hatırlatıcısı planlayın.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Reminder Type -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Hatırlatıcı Türü</label>
<div class="flex h-12 flex-1 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center gap-2 overflow-hidden rounded-md px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-[#1e313d] has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-medium transition-all">
<span class="material-symbols-outlined text-[20px]">mail</span>
<span class="truncate">Email</span>
<input class="invisible w-0" name="reminder_type" type="radio" value="Email"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center gap-2 overflow-hidden rounded-md px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-[#1e313d] has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-medium transition-all">
<span class="material-symbols-outlined text-[20px]">notifications_active</span>
<span class="truncate">Uygulama İçi</span>
<input class="invisible w-0" name="reminder_type" type="radio" value="Uygulama İçi"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center gap-2 overflow-hidden rounded-md px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-[#1e313d] has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-medium transition-all">
<span class="material-symbols-outlined text-[20px]">all_inclusive</span>
<span class="truncate">Her İkisi</span>
<input checked="" class="invisible w-0" name="reminder_type" type="radio" value="Her İkisi"/>
</label>
</div>
</div>
<!-- Title -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Başlık</label>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-[#1a2b35] border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 placeholder:text-slate-400 px-4 text-sm transition-colors" placeholder="Hatırlatıcı başlığını girin" type="text"/>
</div>
<!-- Message -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Mesaj</label>
<textarea class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-[#1a2b35] border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary min-h-[120px] placeholder:text-slate-400 p-4 text-sm resize-y transition-colors" placeholder="Bildirim içeriğini detaylıca yazın"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Target Date/Time -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Hedef Tarih ve Saat</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">calendar_month</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-[#1a2b35] border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 pl-10 pr-4 text-sm transition-colors [color-scheme:light] dark:[color-scheme:dark]" type="datetime-local"/>
</div>
</div>
<!-- Notify Before -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Önce Bildirim</label>
<div class="flex gap-2">
<input class="form-input w-24 rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-[#1a2b35] border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-sm transition-colors" min="1" type="number" value="15"/>
<select class="form-select flex-1 rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-[#1a2b35] border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-sm transition-colors cursor-pointer">
<option value="minutes">Dakika</option>
<option value="hours">Saat</option>
<option value="days">Gün</option>
</select>
</div>
</div>
</div>
<!-- Association -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Müşteri veya Teklif İlişkilendirme (Opsiyonel)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-[#1a2b35] border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 pl-10 pr-4 text-sm transition-colors" placeholder="Müşteri adı, ID veya Teklif No arayın..." type="text"/>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-3 pt-6 mt-2 border-t border-slate-200 dark:border-slate-800">
<button class="px-6 py-2.5 rounded-lg text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 font-medium text-sm transition-colors" type="button">
                                İptal
                            </button>
<button class="px-6 py-2.5 rounded-lg text-white bg-primary hover:bg-primary/90 font-medium text-sm transition-colors flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                                Kaydet
                            </button>
</div>
</form>
</div>
</div>
</div>
</div>
</body></html>
