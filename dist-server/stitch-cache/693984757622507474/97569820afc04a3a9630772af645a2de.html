<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Diag Counter V4</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f5f5f5", // Adjusted to match user request
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg w-full max-w-md overflow-hidden border border-slate-200 dark:border-slate-700">
<!-- Header -->
<div class="px-6 py-5 border-b border-slate-100 dark:border-slate-700">
<h1 class="text-xl font-bold tracking-tight text-center">Diag Counter V4</h1>
</div>
<!-- Counter Display -->
<div class="px-6 py-12 flex justify-center items-center bg-slate-50 dark:bg-slate-800/50">
<span class="text-[72px] font-bold leading-none tabular-nums text-slate-800 dark:text-white">0</span>
</div>
<!-- Controls -->
<div class="px-6 py-8">
<div class="flex flex-col sm:flex-row gap-4 justify-center">
<!-- Increment Button -->
<button class="flex-1 flex items-center justify-center gap-2 bg-[#4CAF50] hover:brightness-110 active:scale-95 transition-all duration-150 text-white font-medium py-3 px-4 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-[20px]">add</span>
                    Increment
                </button>
<!-- Decrement Button -->
<button class="flex-1 flex items-center justify-center gap-2 bg-[#f44336] hover:brightness-110 active:scale-95 transition-all duration-150 text-white font-medium py-3 px-4 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-[20px]">remove</span>
                    Decrement
                </button>
<!-- Reset Button -->
<button class="flex-1 flex items-center justify-center gap-2 bg-[#9e9e9e] hover:brightness-110 active:scale-95 transition-all duration-150 text-white font-medium py-3 px-4 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-[20px]">refresh</span>
                    Reset
                </button>
</div>
</div>
</div>
</body></html>
