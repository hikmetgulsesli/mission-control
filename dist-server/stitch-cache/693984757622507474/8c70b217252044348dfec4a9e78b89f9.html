<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yapılacaklar Listesi Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">
<!-- Main App Container -->
<main class="w-full max-w-[500px] rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex flex-col">
<!-- Header -->
<header class="px-6 pt-6 pb-4 border-b border-slate-100 dark:border-slate-800">
<h1 class="text-[24px] font-semibold tracking-tight text-slate-900 dark:text-white">Yapılacaklar Listesi</h1>
</header>
<!-- Content Area -->
<div class="p-6 flex flex-col gap-6">
<!-- Input Section -->
<div class="flex gap-3 items-center">
<input class="flex-1 rounded-lg border border-slate-300 dark:border-slate-700 bg-transparent px-4 py-2.5 text-base text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-shadow" placeholder="Görev girin..." type="text"/>
<button class="flex h-[46px] items-center justify-center gap-2 rounded-lg bg-primary px-5 font-semibold text-white hover:bg-primary/90 focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-slate-900 transition-all">
<span class="material-symbols-outlined text-[20px]">add</span>
<span>Ekle</span>
</button>
</div>
<!-- Filter Bar -->
<div class="flex w-full rounded-lg bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex-1 relative text-center">
<input checked="" class="peer sr-only" name="filter" type="radio" value="all"/>
<div class="cursor-pointer rounded-md py-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all hover:text-slate-700 dark:hover:text-slate-300">Tümü</div>
</label>
<label class="flex-1 relative text-center">
<input class="peer sr-only" name="filter" type="radio" value="active"/>
<div class="cursor-pointer rounded-md py-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all hover:text-slate-700 dark:hover:text-slate-300">Aktif</div>
</label>
<label class="flex-1 relative text-center">
<input class="peer sr-only" name="filter" type="radio" value="completed"/>
<div class="cursor-pointer rounded-md py-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all hover:text-slate-700 dark:hover:text-slate-300">Tamamlanan</div>
</label>
</div>
<!-- Task List -->
<ul class="flex flex-col gap-2">
<!-- Active Task 1 -->
<li class="group flex items-center justify-between gap-3 rounded-lg border border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30 p-3 hover:bg-slate-50 dark:hover:bg-slate-800/80 transition-colors">
<label class="flex items-center gap-3 flex-1 cursor-pointer">
<input class="h-5 w-5 rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary dark:bg-slate-700 cursor-pointer transition-colors" type="checkbox"/>
<span class="text-[16px] text-slate-700 dark:text-slate-200 select-none">Yeni arayüz tasarımlarını incele</span>
</label>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-all p-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</li>
<!-- Active Task 2 -->
<li class="group flex items-center justify-between gap-3 rounded-lg border border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30 p-3 hover:bg-slate-50 dark:hover:bg-slate-800/80 transition-colors">
<label class="flex items-center gap-3 flex-1 cursor-pointer">
<input class="h-5 w-5 rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary dark:bg-slate-700 cursor-pointer transition-colors" type="checkbox"/>
<span class="text-[16px] text-slate-700 dark:text-slate-200 select-none">Kullanıcı geri bildirimlerini yanıtla</span>
</label>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-all p-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</li>
<!-- Completed Task -->
<li class="group flex items-center justify-between gap-3 rounded-lg border border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30 p-3 hover:bg-slate-50 dark:hover:bg-slate-800/80 transition-colors">
<label class="flex items-center gap-3 flex-1 cursor-pointer">
<input checked="" class="h-5 w-5 rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary dark:bg-slate-700 cursor-pointer transition-colors" type="checkbox"/>
<span class="text-[16px] text-slate-400 dark:text-slate-500 line-through select-none">Haftalık takım toplantısı</span>
</label>
<button aria-label="Görevi sil" class="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-all p-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</li>
</ul>
<!-- Empty State (Hidden for preview purposes, active when no tasks) 
            <div class="flex flex-col items-center justify-center py-8 text-center hidden">
                <span class="material-symbols-outlined text-[48px] text-slate-200 dark:text-slate-700 mb-3">task</span>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Henüz görev yok. Yukarıdan ekleyin!</p>
            </div>
            -->
</div>
</main>
</body></html>
