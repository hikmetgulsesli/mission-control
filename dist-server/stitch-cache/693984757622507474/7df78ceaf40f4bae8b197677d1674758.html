<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Main Timer Mobile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5d6d7e",
                        "background-light": "#f7f7f7",
                        "background-dark": "#17191b",
                        "tomato": "#E74C3C",
                        "charcoal": "#2D2D2D",
                        "offwhite": "#FAF9F6"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "timer": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col items-center justify-center">
<div class="relative flex h-screen max-w-[400px] w-full flex-col bg-offwhite dark:bg-background-dark group/design-root overflow-x-hidden shadow-xl mx-auto border-x border-slate-200 dark:border-slate-800">
<!-- Header -->
<div class="flex items-center p-4 justify-between shrink-0">
<div class="flex size-12 shrink-0 items-center justify-center cursor-pointer text-charcoal dark:text-slate-200">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-charcoal dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center font-display">Pomodoro Timer</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center overflow-hidden rounded-full h-12 w-12 bg-transparent text-charcoal dark:text-slate-200 cursor-pointer">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</div>
<!-- Main Content Vertically Centered -->
<div class="flex flex-col flex-1 items-center justify-center px-4 w-full gap-8">
<!-- Phase Indicator -->
<div class="flex justify-center">
<div class="flex h-8 shrink-0 items-center justify-center rounded-full bg-tomato px-4 shadow-sm">
<p class="text-white text-sm font-bold tracking-widest leading-normal">WORK</p>
</div>
</div>
<!-- Timer -->
<div class="flex flex-col items-center justify-center py-8">
<div class="text-[80px] font-timer font-medium text-charcoal dark:text-slate-100 leading-none tracking-tight">
                25:00
            </div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-4 uppercase tracking-wider">Session 1 of 4</p>
</div>
</div>
<!-- Bottom Actions -->
<div class="px-4 pb-8 w-full mt-auto">
<div class="flex flex-col gap-3 w-full">
<button class="flex items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-primary hover:bg-primary/90 transition-colors text-white text-base font-bold tracking-wide w-full shadow-md">
<span>START</span>
</button>
<button class="flex items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-transparent border-2 border-primary/20 text-primary dark:text-slate-300 dark:border-slate-700 hover:bg-primary/5 transition-colors text-base font-bold tracking-wide w-full">
<span>RESET</span>
</button>
</div>
</div>
<!-- Safe Area Bottom padding for iOS -->
<div class="h-6 w-full"></div>
</div>
</body></html>
