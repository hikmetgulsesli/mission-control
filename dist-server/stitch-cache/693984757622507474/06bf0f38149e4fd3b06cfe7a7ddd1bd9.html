<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Counter App Main Screen</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&amp;family=Sora:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22d3ee",
                        "secondary": "#a3e635",
                        "background-light": "#f6f8f8",
                        "background-dark": "#18181b",
                        "surface": "#27272a"
                    },
                    fontFamily: {
                        "display": ["Sora", "sans-serif"],
                        "body": ["Nunito Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
        }
        .font-sora {
            font-family: 'Sora', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-body antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-surface px-10 py-4 w-full">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight font-sora">DevCounter</h2>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-8">
<div class="flex flex-col items-center justify-center w-full max-w-[600px] gap-12 p-12 rounded-2xl bg-surface/30 border border-surface shadow-xl">
<div class="flex flex-col items-center gap-2">
<span class="text-sm font-semibold tracking-widest uppercase text-slate-500 dark:text-slate-400">Current Value</span>
<h1 class="font-sora text-primary tracking-tight text-[72px] font-bold leading-none text-center tabular-nums">
                            0
                        </h1>
</div>
<div class="flex flex-row items-center justify-center gap-6 w-full mt-4">
<button class="flex items-center justify-center gap-2 overflow-hidden rounded-lg h-14 px-6 bg-surface hover:bg-surface/80 text-slate-100 text-base font-bold leading-normal transition-colors duration-200 border border-transparent hover:border-primary/30">
<span class="material-symbols-outlined text-xl">remove</span>
<span class="truncate">Decrement</span>
</button>
<button class="flex items-center justify-center gap-2 overflow-hidden rounded-lg h-14 px-8 bg-secondary hover:bg-secondary/90 text-slate-900 text-base font-bold leading-normal transition-colors duration-200 shadow-lg shadow-secondary/20">
<span class="material-symbols-outlined text-xl">add</span>
<span class="truncate">Increment</span>
</button>
<button class="flex items-center justify-center gap-2 overflow-hidden rounded-lg h-14 px-6 bg-transparent hover:bg-surface/50 text-slate-400 hover:text-slate-200 text-base font-bold leading-normal transition-colors duration-200 border border-surface">
<span class="material-symbols-outlined text-xl">restart_alt</span>
<span class="truncate">Reset</span>
</button>
</div>
<div class="w-full flex justify-between items-center pt-8 mt-4 border-t border-surface/50 text-xs text-slate-500 font-mono">
<span>v1.0.4</span>
<div class="flex gap-2 items-center">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span>System Online</span>
</div>
</div>
</div>
</main>
</div>
</div>
</body></html>
