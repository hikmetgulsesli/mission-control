<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script id="tailwind-config">
        tailwind.config = {

                        "sky-soft": "#e0f2fe",
                        "sky-icon": "#0284c7"
                    },
                    fontFamily: {
                        "display": ["Sora", "sans-serif"],

                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

            },
        }

<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-body">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] w-full max-w-[400px] p-8 flex flex-col items-center gap-8">
<div class="text-center w-full">

</div>
<div class="font-display text-slate-800 dark:text-slate-100 text-[64px] font-bold leading-none py-4">

        </div>
