<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lojistik CRM Giriş Ekranı</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Work+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0da2e7",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                        "navy-blue": "#1e3a5f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-body min-h-screen flex text-slate-900 dark:text-slate-100">
<div class="flex w-full min-h-screen">
<div class="hidden lg:flex lg:w-1/2 bg-navy-blue flex-col justify-end overflow-hidden relative" data-alt="Istanbul Bosphorus silhouette with container ships" style="background-image: linear-gradient(180deg, rgba(30, 58, 95, 0.4) 0%, rgba(30, 58, 95, 0.9) 100%), url('https://lh3.googleusercontent.com/aida-public/AB6AXuD1W3gPBvp57WcI6Rlnccisks54qQWe8h9k-ay7wmaNP6ZEQVyUFPDnv5GVE30fbujfzH_n-bdzo85cW3bKyQoRkVmBYiAN9YAfie2UbDNgEkKv8obZkhlTh8t_Zsai7ecs5O3s505RjQRvdnn6M_ATXs8VHMu1KHixfc8hcgo-aLMaafjudtrj0ZiI8Mda2dyE6dLS6og-2Deud5oThZOOgT_jjbdeN9P0TT20lqR9iJx4rANw-JYpaMPO_Y9GREILPawKUKakmg'); background-size: cover; background-position: center;">
<div class="p-12 relative z-10">
<h1 class="font-display text-white text-4xl font-bold mb-4">Küresel Lojistiğinizi Yönetin</h1>
<p class="text-slate-200 text-lg max-w-md">Deniz, hava ve kara taşımacılığı operasyonlarınızı tek bir ekrandan güvenle kontrol edin.</p>
</div>
</div>
<div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 bg-[#fdfbf7] dark:bg-background-dark">
<div class="w-full max-w-md flex flex-col gap-6">
<div class="flex items-center gap-4 text-navy-blue dark:text-primary mb-6 justify-center">
<span class="material-symbols-outlined text-4xl">directions_boat</span>
<h2 class="font-display text-2xl font-bold tracking-tight">Uluslararasi Nakliye CRM</h2>
</div>
<div class="flex flex-col gap-2 mb-4 text-center">
<h3 class="font-display text-slate-900 dark:text-slate-100 text-3xl font-bold">Giriş Yap</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm">Sisteme erişmek için bilgilerinizi giriniz.</p>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="font-display text-slate-700 dark:text-slate-300 text-sm font-semibold" for="email">E-posta</label>
<input class="form-input w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 dark:text-slate-100" id="email" placeholder="ornek@sirket.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-display text-slate-700 dark:text-slate-300 text-sm font-semibold" for="password">Şifre</label>
<input class="form-input w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 dark:text-slate-100" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="form-checkbox rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400">Beni Hatırla</span>
</label>
<a class="text-sm text-primary hover:underline font-medium" href="#">Şifremi Unuttum</a>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-display font-semibold h-12 rounded-lg transition-colors mt-4" type="submit">
                        Giriş Yap
                    </button>
</form>
<div class="text-center mt-6">
<p class="text-sm text-slate-500 dark:text-slate-400">Hesabınız yok mu? <a class="text-primary hover:underline font-medium" href="#">Satış ile iletişime geçin</a></p>
</div>
</div>
</div>
</div>
</body></html>
