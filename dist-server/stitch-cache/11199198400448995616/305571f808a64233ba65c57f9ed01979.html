<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Not Defteri Empty State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a94d9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121920",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-slate-200 dark:border-b-slate-800 px-10 py-4 bg-white dark:bg-slate-900 sticky top-0 z-10">
<div class="flex items-center gap-4">
<div class="size-6 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">edit_note</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">Not Defteri</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">search</span>
</button>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">settings</span>
</button>
</div>
</header>
<div class="flex flex-1 justify-center py-10 px-4 md:px-10">
<div class="layout-content-container flex flex-col w-full max-w-[960px] flex-1 relative">
<div class="flex flex-col items-center justify-center flex-1 h-full min-h-[50vh] gap-6 px-4 py-12">
<div class="flex flex-col items-center gap-6 animate-fade-in">
<div class="flex items-center justify-center w-32 h-32 rounded-full bg-primary/10 dark:bg-primary/20 text-primary mb-2 shadow-sm">
<span class="material-symbols-outlined text-[64px] font-light">note_add</span>
</div>
<div class="flex max-w-[480px] flex-col items-center gap-3">
<h1 class="text-2xl md:text-3xl font-bold leading-tight tracking-tight text-center">Henüz notunuz yok</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed text-center max-w-sm">
                                    İlk notunuzu eklemek için sayfanın sağ altındaki + butonuna veya aşağıdaki düğmeye tıklayın.
                                </p>
</div>
<button class="mt-4 flex min-w-[140px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-6 bg-primary text-white text-sm font-semibold leading-normal tracking-wide shadow-md hover:bg-primary/90 transition-all hover:shadow-lg active:scale-95 group">
<span class="material-symbols-outlined mr-2 text-[20px] group-hover:rotate-90 transition-transform duration-300">add</span>
<span>Yeni Not Oluştur</span>
</button>
</div>
</div>
<!-- Floating Action Button -->
<div class="fixed bottom-8 right-8 z-50">
<button class="flex cursor-pointer items-center justify-center overflow-hidden rounded-full size-16 bg-primary text-white shadow-lg hover:shadow-xl hover:bg-primary/90 transition-all hover:-translate-y-1 active:scale-95 group focus:outline-none focus:ring-4 focus:ring-primary/30">
<span class="material-symbols-outlined text-[32px] group-hover:rotate-90 transition-transform duration-300">add</span>
</button>
</div>
</div>
</div>
</div>
</div>
</body></html>
