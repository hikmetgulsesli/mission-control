<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Delete Confirmation Dialog - Not Defteri</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec1313",
              "background-light": "#f8f6f6",
              "background-dark": "#221010",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem", 
              "lg": "0.5rem", 
              "xl": "0.75rem", 
              "full": "9999px"
            },
          },
        },
      }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/20">
<!-- Mock Background App Dashboard (to show the context) -->
<div class="min-h-screen w-full flex flex-col p-8 opacity-40 grayscale-[20%] pointer-events-none">
<header class="flex items-center justify-between mb-8 border-b border-slate-200 dark:border-slate-800 pb-4">
<h1 class="text-2xl font-bold tracking-tight">Not Defteri</h1>
<div class="h-10 w-10 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</header>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-48 rounded-xl bg-white dark:bg-[#2a1414] shadow-sm border border-slate-100 dark:border-[#3a1a1a] p-5">
<div class="h-4 w-3/4 bg-slate-200 dark:bg-[#3a1a1a] rounded mb-3"></div>
<div class="h-3 w-full bg-slate-100 dark:bg-[#3a1a1a]/50 rounded mb-2"></div>
<div class="h-3 w-5/6 bg-slate-100 dark:bg-[#3a1a1a]/50 rounded"></div>
</div>
<div class="h-48 rounded-xl bg-white dark:bg-[#2a1414] shadow-sm border border-slate-100 dark:border-[#3a1a1a] p-5">
<div class="h-4 w-1/2 bg-slate-200 dark:bg-[#3a1a1a] rounded mb-3"></div>
<div class="h-3 w-full bg-slate-100 dark:bg-[#3a1a1a]/50 rounded mb-2"></div>
<div class="h-3 w-4/6 bg-slate-100 dark:bg-[#3a1a1a]/50 rounded"></div>
</div>
<div class="h-48 rounded-xl bg-white dark:bg-[#2a1414] shadow-sm border border-slate-100 dark:border-[#3a1a1a] p-5">
<div class="h-4 w-2/3 bg-slate-200 dark:bg-[#3a1a1a] rounded mb-3"></div>
<div class="h-3 w-full bg-slate-100 dark:bg-[#3a1a1a]/50 rounded mb-2"></div>
<div class="h-3 w-full bg-slate-100 dark:bg-[#3a1a1a]/50 rounded"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
<!-- Delete Confirmation Dialog -->
<div class="flex flex-col w-full max-w-[420px] bg-background-light dark:bg-[#2a1414] rounded-xl shadow-2xl overflow-hidden transform transition-all border border-slate-200/50 dark:border-[#401c1c]/50">
<div class="flex flex-col items-center px-6 pt-8 pb-6">
<!-- Warning Icon -->
<div class="flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 text-primary mb-6 ring-8 ring-primary/5">
<span class="material-symbols-outlined text-[32px]">delete_forever</span>
</div>
<!-- Headline Text Component Adapted -->
<h2 class="text-slate-900 dark:text-slate-100 text-[22px] font-bold leading-tight text-center tracking-tight mb-2">
                    Bu notu silmek istediğinizden emin misiniz?
                </h2>
<p class="text-slate-500 dark:text-slate-400 text-sm text-center mb-8 px-2 leading-relaxed">
                    Bu işlem geri alınamaz. Notunuz kalıcı olarak silinecek ve uygulamadan kaldırılacaktır.
                </p>
<!-- Buttons -->
<div class="flex w-full gap-3 flex-wrap justify-center">
<button class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-5 bg-slate-200 hover:bg-slate-300 dark:bg-[#3a1a1a] dark:hover:bg-[#4a2222] text-slate-800 dark:text-slate-200 text-sm font-semibold leading-normal tracking-[0.015em] transition-colors grow">
<span class="truncate">İptal</span>
</button>
<button class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-5 bg-primary hover:bg-primary/90 text-white text-sm font-semibold leading-normal tracking-[0.015em] shadow-sm shadow-primary/20 transition-colors grow">
<span class="truncate">Sil</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
