<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pomodoro Timer Dashboard - Break State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bf3a2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1f1413",
                        "break-green": "#27AE60",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-break-green group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 sm:px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[400px] w-full flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-white/20 px-4 py-4">
<div class="flex items-center gap-3 text-white">
<span class="material-symbols-outlined text-2xl">timer</span>
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">POMODORO v2.0</h2>
</div>
</header>
<div class="flex flex-col items-center justify-center flex-1 py-12">
<h1 class="text-white tracking-widest uppercase text-3xl font-bold leading-tight px-4 text-center mb-6">Break</h1>
<div class="flex items-baseline justify-center font-mono text-white text-[72px] font-bold leading-none tracking-tight mb-12">
<span>05</span>
<span class="mx-2 opacity-80">:</span>
<span>00</span>
</div>
<div class="flex items-center justify-between bg-white/10 rounded-xl px-6 py-4 mb-8 w-full backdrop-blur-sm">
<div class="flex items-center gap-4">
<div class="text-white bg-white/20 p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined">local_pizza</span>
</div>
<p class="text-white text-lg font-medium leading-normal">4 Pomodoros</p>
</div>
<div class="flex gap-2">
<div class="size-2 rounded-full bg-white opacity-50"></div>
<div class="size-2 rounded-full bg-white opacity-50"></div>
<div class="size-2 rounded-full bg-white opacity-50"></div>
<div class="size-2 rounded-full bg-white"></div>
</div>
</div>
<div class="flex flex-wrap gap-4 w-full justify-center">
<button class="flex items-center justify-center rounded-xl h-14 px-8 bg-white/20 hover:bg-white/30 transition-colors text-white text-lg font-bold shadow-sm backdrop-blur-sm flex-1 min-w-[120px]">
<span class="material-symbols-outlined mr-2">play_arrow</span> Play
                            </button>
<button class="flex items-center justify-center rounded-xl h-14 px-8 bg-white/20 hover:bg-white/30 transition-colors text-white text-lg font-bold shadow-sm backdrop-blur-sm flex-1 min-w-[120px]">
<span class="material-symbols-outlined mr-2">pause</span> Pause
                            </button>
<button class="flex items-center justify-center rounded-xl h-14 w-14 bg-white/20 hover:bg-white/30 transition-colors text-white shadow-sm backdrop-blur-sm shrink-0">
<span class="material-symbols-outlined text-2xl">restart_alt</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
