<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pomodoro Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C0392B",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1f1413",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-body antialiased flex items-center justify-center min-h-screen p-4">
<div class="relative flex flex-col w-full max-w-[400px] bg-primary rounded-xl shadow-2xl overflow-hidden p-8 text-white">
<!-- Header -->
<div class="flex items-center justify-between mb-12">
<h1 class="font-display font-bold text-xl tracking-widest uppercase">Pomodoro</h1>
<span class="text-white/70 text-sm font-medium">v2.0</span>
</div>
<!-- Timer Section -->
<div class="flex flex-col items-center justify-center mb-12">
<h2 class="font-display font-bold text-3xl mb-4 tracking-tight">Work</h2>
<div class="font-display font-bold text-[72px] leading-none tracking-tight">
                25:00
            </div>
</div>
<!-- Sessions Info -->
<div class="flex items-center justify-center gap-2 mb-12 bg-white/10 py-3 px-6 rounded-full mx-auto w-fit">
<span class="material-symbols-outlined text-white/90">local_florist</span>
<span class="font-bold text-xl">3</span>
<span class="text-white/70 text-sm ml-1">sessions</span>
</div>
<!-- Controls -->
<div class="flex items-center justify-center gap-4">
<button aria-label="Reset" class="flex items-center justify-center w-14 h-14 rounded-full bg-white/20 hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-2xl">replay</span>
</button>
<button aria-label="Play" class="flex items-center justify-center w-20 h-20 rounded-full bg-white text-primary hover:bg-white/90 transition-colors shadow-lg">
<span class="material-symbols-outlined text-4xl ml-1">play_arrow</span>
</button>
<button aria-label="Pause" class="flex items-center justify-center w-14 h-14 rounded-full bg-white/20 hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-2xl">pause</span>
</button>
</div>
</div>
</body></html>
