<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lookup Value Management Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"],
                        "heading": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {

        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex h-screen w-full flex-col overflow-hidden">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-3 shrink-0">
<div class="flex items-center gap-4">
<div class="size-8 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">settings</span>
</div>
<h2 class="font-heading text-xl font-bold leading-tight tracking-[-0.015em]">Admin Config</h2>
</div>
<div class="flex items-center gap-6">
<button class="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="bg-slate-200 dark:bg-slate-700 bg-center bg-no-repeat aspect-square bg-cover rounded-full size-9 flex items-center justify-center overflow-hidden" data-alt="User profile avatar placeholder">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">person</span>
</div>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<aside class="w-1/4 max-w-[320px] min-w-[250px] border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col overflow-y-auto">
<div class="p-4 border-b border-slate-200 dark:border-slate-800 shrink-0">
<h1 class="font-heading text-lg font-semibold leading-normal mb-1">Lookups</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Categories</p>
<div class="mt-4 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
<input class="w-full pl-9 pr-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:text-slate-200 placeholder-slate-400" placeholder="Search categories..." type="text"/>
</div>
</div>
<div class="flex flex-col gap-1 p-3">
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary w-full text-left">
<span class="material-symbols-outlined text-xl">local_shipping</span>
<span class="text-sm font-medium leading-normal">Transport Type</span>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-700 dark:text-slate-300 w-full text-left transition-colors">
<span class="material-symbols-outlined text-xl">inventory_2</span>
<span class="text-sm font-medium leading-normal">Cargo Type</span>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-700 dark:text-slate-300 w-full text-left transition-colors">
<span class="material-symbols-outlined text-xl">description</span>
<span class="text-sm font-medium leading-normal">Quote Status</span>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-700 dark:text-slate-300 w-full text-left transition-colors">
<span class="material-symbols-outlined text-xl">group</span>
<span class="text-sm font-medium leading-normal">Customer Status</span>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-700 dark:text-slate-300 w-full text-left transition-colors">
<span class="material-symbols-outlined text-xl">public</span>
<span class="text-sm font-medium leading-normal">Country</span>
</button>
<button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-700 dark:text-slate-300 w-full text-left transition-colors">
<span class="material-symbols-outlined text-xl">monitoring</span>
<span class="text-sm font-medium leading-normal">Activity Type</span>
</button>

</aside>

<div class="flex items-center justify-between p-6 shrink-0 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
<div class="flex flex-col gap-1">
<h2 class="font-heading text-2xl font-bold leading-tight">Transport Type</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Manage dropdown values for transport type</p>
</div>
<button class="flex cursor-pointer items-center justify-center gap-2 rounded-lg px-4 py-2 bg-primary hover:bg-primary/90 text-white text-sm font-medium leading-normal transition-colors shadow-sm">
<span class="material-symbols-outlined text-[18px]">add</span>
<span>Add New Value</span>
</button>
</div>
<div class="flex-1 p-6 overflow-y-auto">
<div class="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
<div class="overflow-x-auto">
<table class="w-full text-left text-sm whitespace-nowrap">

<th class="px-6 py-4 font-semibold text-slate-900 dark:text-slate-100 w-[25%]">Label</th>
<th class="px-6 py-4 font-semibold text-slate-900 dark:text-slate-100 w-[25%]">Value</th>
<th class="px-6 py-4 font-semibold text-slate-900 dark:text-slate-100 w-[15%]">Sort Order</th>
<th class="px-6 py-4 font-semibold text-slate-900 dark:text-slate-100 w-[15%]">Status</th>
<th class="px-6 py-4 font-semibold text-slate-900 dark:text-slate-100 w-[20%] text-right">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-200 dark:divide-slate-700">
<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/25 transition-colors">
<td class="px-6 py-4 font-medium text-slate-900 dark:text-slate-100">Air Freight</td>
<td class="px-6 py-4 text-slate-500 dark:text-slate-400 font-mono text-xs bg-slate-100 dark:bg-slate-800 rounded px-2 py-1 inline-block mt-3 ml-6">air_freight</td>
<td class="px-6 py-4 text-slate-600 dark:text-slate-300">10</td>
<td class="px-6 py-4">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-slate-600 peer-checked:bg-primary"></div>
</label>
</td>
<td class="px-6 py-4 text-right">
<div class="flex items-center justify-end gap-2">
<button class="p-2 text-slate-400 hover:text-primary rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Edit">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-500 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Delete">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/25 transition-colors">
<td class="px-6 py-4 font-medium text-slate-900 dark:text-slate-100">Sea Freight</td>
<td class="px-6 py-4 text-slate-500 dark:text-slate-400 font-mono text-xs bg-slate-100 dark:bg-slate-800 rounded px-2 py-1 inline-block mt-3 ml-6">sea_freight</td>
<td class="px-6 py-4 text-slate-600 dark:text-slate-300">20</td>
<td class="px-6 py-4">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-slate-600 peer-checked:bg-primary"></div>
</label>
</td>
<td class="px-6 py-4 text-right">
<div class="flex items-center justify-end gap-2">
<button class="p-2 text-slate-400 hover:text-primary rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Edit">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-500 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Delete">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/25 transition-colors">
<td class="px-6 py-4 font-medium text-slate-900 dark:text-slate-100">Road Transport</td>
<td class="px-6 py-4 text-slate-500 dark:text-slate-400 font-mono text-xs bg-slate-100 dark:bg-slate-800 rounded px-2 py-1 inline-block mt-3 ml-6">road_transport</td>
<td class="px-6 py-4 text-slate-600 dark:text-slate-300">30</td>
<td class="px-6 py-4">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-slate-600 peer-checked:bg-primary"></div>
</label>
</td>
<td class="px-6 py-4 text-right">
<div class="flex items-center justify-end gap-2">
<button class="p-2 text-slate-400 hover:text-primary rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Edit">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-500 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Delete">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/25 transition-colors">
<td class="px-6 py-4 font-medium text-slate-900 dark:text-slate-100 text-slate-400 dark:text-slate-500 line-through">Rail Freight</td>
<td class="px-6 py-4 text-slate-400 dark:text-slate-500 font-mono text-xs bg-slate-100/50 dark:bg-slate-800/50 rounded px-2 py-1 inline-block mt-3 ml-6">rail_freight</td>
<td class="px-6 py-4 text-slate-400 dark:text-slate-500">40</td>
<td class="px-6 py-4">
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-slate-600 peer-checked:bg-primary"></div>
</label>
</td>
<td class="px-6 py-4 text-right">
<div class="flex items-center justify-end gap-2">
<button class="p-2 text-slate-400 hover:text-primary rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Edit">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-red-500 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Delete">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</main>
</div>
</div>
</body></html>
