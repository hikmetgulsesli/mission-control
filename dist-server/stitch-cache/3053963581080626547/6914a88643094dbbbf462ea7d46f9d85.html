<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Savaş Gemileri - Yenilgi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }

</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen antialiased selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Subtle background vignette/glow effect -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800/20 via-background-dark to-background-dark -z-10 pointer-events-none"></div>
<div class="layout-container flex h-full grow flex-col z-10">
<div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-8">
<div class="layout-content-container flex flex-col w-full max-w-[1200px] flex-1">
<!-- Header -->
<div class="flex flex-col items-center justify-center gap-2 p-6 text-center mb-4">
<span class="material-symbols-outlined text-red-500/80 text-6xl mb-2">skull</span>
<h1 class="text-slate-900 dark:text-white text-5xl md:text-6xl font-black leading-tight tracking-tight uppercase">Yenilgi!</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg md:text-xl font-medium tracking-wide">Düşman donanması galip geldi.</p>
</div>
<!-- Stats Panel -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 mb-6">
<div class="flex flex-col gap-2 rounded-xl p-6 bg-slate-200/50 dark:bg-slate-800/50 border border-slate-300/50 dark:border-slate-700/50 backdrop-blur-sm shadow-sm transition-transform hover:scale-[1.02]">
<p class="text-slate-600 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Toplam Atış</p>
<p class="text-slate-900 dark:text-white text-3xl font-bold">64</p>
</div>
<div class="flex flex-col gap-2 rounded-xl p-6 bg-slate-200/50 dark:bg-slate-800/50 border border-slate-300/50 dark:border-slate-700/50 backdrop-blur-sm shadow-sm transition-transform hover:scale-[1.02]">
<p class="text-slate-600 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">İsabet</p>
<p class="text-emerald-600 dark:text-emerald-400 text-3xl font-bold">10</p>
</div>
<div class="flex flex-col gap-2 rounded-xl p-6 bg-slate-200/50 dark:bg-slate-800/50 border border-slate-300/50 dark:border-slate-700/50 backdrop-blur-sm shadow-sm transition-transform hover:scale-[1.02]">
<p class="text-slate-600 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Karavana</p>
<p class="text-red-600 dark:text-red-400 text-3xl font-bold">54</p>
</div>
<div class="flex flex-col gap-2 rounded-xl p-6 bg-slate-200/50 dark:bg-slate-800/50 border border-slate-300/50 dark:border-slate-700/50 backdrop-blur-sm shadow-sm transition-transform hover:scale-[1.02] relative overflow-hidden">
<div class="absolute right-[-20%] top-[-20%] w-24 h-24 rounded-full border-8 border-primary/20 flex items-center justify-center opacity-50 pointer-events-none"></div>
<p class="text-slate-600 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">İsabet Oranı</p>
<p class="text-primary dark:text-primary text-3xl font-bold">%15</p>
</div>
</div>
<!-- Grids Section -->
<div class="flex flex-col lg:flex-row w-full gap-8 p-4 mb-8">
<!-- Player Grid -->
<div class="flex-1 flex flex-col gap-4 items-center">
<h2 class="text-lg font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">directions_boat</span> Senin Filon
                        </h2>
<div class="w-full max-w-[400px] aspect-square rounded-xl overflow-hidden border-2 border-slate-300 dark:border-slate-700 shadow-lg bg-center bg-no-repeat bg-cover" data-alt="Player battleship grid showing destroyed ships on blue grid" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCt1-6gZgrStAZWhSyLE7ivkZyLBJxR7bOyQIEB3UU2xDcmY7xtPuL8qbapCOKcmfyieWbTGIEQ9FceAsKRUCCS5u9Oop1P1aBVyo-kxcN-sKVLFbeTsPZvqVT2AKhOUhKFaAIxOcVE9pKBuy4B6ploztGXHCpa6FFyA0I-gjvWUcHbFWI4QuNr2llxbOqHcmL5KdLX93XT1MdeNEoJ0DuloI6NPmYP8LNrre0V77UG5CFaJNkJL-9Z_omhhTcMxEtvcnfkV_aZYrA");'>

<div class="w-full h-full bg-slate-900/40 backdrop-blur-[2px] grid grid-cols-10 grid-rows-10 p-[2px] gap-[2px]">
<!-- Simulated grid cells would go here in a real app -->
<div class="col-span-10 row-span-10 border border-white/10 rounded-sm"></div>
</div>
</div>
</div>
<!-- Enemy Grid -->
<div class="flex-1 flex flex-col gap-4 items-center">
<h2 class="text-lg font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">radar</span> Düşman Filosu (İfşa Edildi)
                        </h2>
<div class="w-full max-w-[400px] aspect-square rounded-xl overflow-hidden border-2 border-slate-300 dark:border-slate-700 shadow-lg bg-center bg-no-repeat bg-cover opacity-80" data-alt="Enemy battleship grid fully revealed showing hidden ships" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA5FV97ScIZrafrTMyPx5I0oviaxXf0ZHcZiHcESb0cL8oddS7uJ-LG9LhPYQHqk_RAu2oYq3DBG4_NQaqM5jydT06QLX9U4fmVo1OSlqgzwY9H_FPhfM5b8mcjDH5ADmTFvHelNelEwgwjo7aPwrPPZrFThhxWcy-s2jwYWx0VZAW36zQQuPz-JwtZqY2l1rlNAFn4J3fy9HSQGj1eIsi-DDRTobAUxZ58NchXuiXkOmhYGpn2nHPtTIFBE_EKCsqYUqFmf1WOjuU");'>
<!-- Overlay to simulate game board look -->
<div class="w-full h-full bg-slate-900/60 backdrop-blur-[1px] grid grid-cols-10 grid-rows-10 p-[2px] gap-[2px]">
<!-- Simulated grid cells would go here in a real app -->
<div class="col-span-10 row-span-10 border border-red-500/20 rounded-sm"></div>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-center mt-auto pb-8">
<div class="flex flex-col sm:flex-row flex-1 gap-4 px-4 w-full max-w-[600px] justify-center">
<button class="flex items-center justify-center gap-2 rounded-lg h-14 px-8 bg-primary hover:bg-primary/90 transition-colors text-white text-lg font-bold tracking-wide shadow-lg shadow-primary/20 grow">
<span class="material-symbols-outlined">replay</span>
<span>Tekrar Oyna</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-lg h-14 px-8 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors text-slate-900 dark:text-white border border-slate-300 dark:border-slate-600 text-lg font-bold tracking-wide shadow-sm grow">
<span class="material-symbols-outlined">home</span>
<span>Ana Menü</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
