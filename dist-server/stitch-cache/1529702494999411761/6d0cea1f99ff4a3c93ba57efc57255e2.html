<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pipeline Test Counter - Dark Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#2463eb",
          "background-light": "#f6f6f8",
          "background-dark": "#111621",
        },
        fontFamily: {
          "display": ["Space Grotesk"]
        },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-4 md:px-10 py-4 mb-8">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-6 text-primary">
<span class="material-symbols-outlined text-[24px]">speed</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">Pipeline Test Counter</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<button class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 gap-2 text-sm font-bold leading-normal tracking-[0.015em] px-3 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="Moon">dark_mode</span>
</button>
</div>
</header>
<div class="flex flex-col items-center justify-center flex-1 gap-6 px-4">
<div class="flex flex-wrap justify-center gap-3 w-full">
<h1 class="text-4xl md:text-5xl font-black leading-tight tracking-[-0.033em] text-center w-full">Pipeline Test</h1>
</div>
<div class="text-[64px] font-bold leading-none py-8 text-center tabular-nums">0</div>
<div class="flex justify-center w-full">
<button class="flex min-w-[120px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-8 bg-primary text-white text-lg font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
<span class="truncate">Artır</span>
</button>
</div>
<div class="flex justify-center w-full mt-4">
<button class="flex min-w-[120px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-6 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 gap-2 text-sm font-medium leading-normal tracking-[0.015em] hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="Moon">dark_mode</span>
<span class="truncate">Dark Mode</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
