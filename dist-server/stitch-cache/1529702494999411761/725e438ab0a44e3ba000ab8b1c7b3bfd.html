<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dev Counter - Light Mode Cyan Accent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ddff2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102122",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f0f0f0] dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-8 w-full max-w-sm flex flex-col items-center">
<h1 class="text-primary font-display text-5xl font-bold mb-8 tracking-tight">42</h1>
<div class="w-full flex flex-col gap-4 mb-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-body font-bold py-3 px-6 rounded-lg transition-colors flex items-center justify-center">
                Tıkla (+1)
            </button>
<button class="w-full border-2 border-primary text-primary hover:bg-primary/10 font-body font-bold py-3 px-6 rounded-lg transition-colors flex items-center justify-center">
                Sıfırla
            </button>
</div>
<button class="mt-4 flex items-center gap-2 text-slate-600 hover:text-primary transition-colors font-body font-medium">
<span class="material-symbols-outlined text-[20px]">dark_mode</span>
<span>Koyu Tema</span>
</button>
</div>
</body></html>
