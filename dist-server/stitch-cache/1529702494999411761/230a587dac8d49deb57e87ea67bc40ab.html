<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dev Counter - Dark Mode Cyan Accent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex items-center justify-center p-4 selection:bg-primary/30 selection:text-primary">
<div class="bg-white dark:bg-[#162e2e] rounded-xl shadow-2xl p-10 w-full max-w-sm flex flex-col items-center gap-10 border border-slate-200 dark:border-[#1e3d3d] transition-colors duration-300">
<!-- Counter Display -->
<div class="flex flex-col items-center justify-center py-6">
<span class="text-7xl font-bold text-primary tracking-tight leading-none drop-shadow-[0_0_15px_rgba(13,242,242,0.2)]">42</span>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4">
<button class="w-full bg-primary text-background-dark text-lg font-bold py-3.5 px-6 rounded-lg hover:bg-primary/90 hover:shadow-[0_0_20px_rgba(13,242,242,0.3)] transition-all duration-200 active:scale-[0.98] flex justify-center items-center gap-2">
<span>Tıkla (+1)</span>
</button>
<button class="w-full border-2 border-primary/50 text-primary text-lg font-bold py-3 px-6 rounded-lg hover:bg-primary/10 hover:border-primary transition-all duration-200 active:scale-[0.98] flex justify-center items-center gap-2">
<span>Sıfırla</span>
</button>
</div>
<!-- Theme Toggle -->
<div class="pt-4 border-t border-slate-200 dark:border-[#1e3d3d] w-full flex justify-center">
<button class="flex items-center gap-2 text-slate-500 dark:text-[#6a9e9e] hover:text-primary dark:hover:text-primary transition-colors duration-200 px-4 py-2 rounded-lg hover:bg-primary/5">
<span class="material-symbols-outlined text-[20px]">light_mode</span>
<span class="text-sm font-medium tracking-wide">Açık Tema</span>
</button>
</div>
</div>
</body></html>
