<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Counter App - Light Mode Card</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
<!-- Main Card Container -->
<div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col">
<!-- Content Area -->
<div class="p-6 md:p-8 flex flex-col gap-8">
<!-- Header/Title (Optional, adding for context) -->
<div class="text-center space-y-1">
<h1 class="text-xl font-bold tracking-tight">Counter</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Simple counting utility</p>
</div>
<!-- Counter Section (Dashed border) -->
<div class="flex flex-col items-center justify-center gap-6 rounded-xl border-2 border-dashed border-slate-200 dark:border-slate-600 p-12 bg-slate-50/50 dark:bg-slate-800/50">
<p class="text-6xl md:text-[5rem] font-bold leading-none tracking-tighter text-slate-900 dark:text-white drop-shadow-sm">0</p>
</div>
<!-- Increment Button -->
<button class="w-full flex items-center justify-center gap-2 rounded-lg bg-primary hover:bg-primary/90 text-white h-14 px-6 text-lg font-bold transition-all focus:ring-4 focus:ring-primary/20 active:scale-[0.98]" type="button">
<span aria-hidden="true" class="material-symbols-outlined text-xl">add</span>
<span>Tıkla (+1)</span>
</button>
</div>
<!-- Footer / Theme Toggle Area -->
<div class="p-4 md:px-8 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-100 dark:border-slate-700 flex justify-center">
<button class="flex w-full items-center justify-center gap-2 rounded-lg h-11 px-4 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-medium border border-slate-200 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-600 transition-colors focus:ring-2 focus:ring-slate-200 dark:focus:ring-slate-500" type="button">
<span>🌙</span>
<span>Koyu Tema</span>
</button>
</div>
</div>
</body></html>
